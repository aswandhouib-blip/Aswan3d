<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes impressions 3D</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #222;
      padding: 10px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 320px));
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .category-title {
      background: #333;
      color: white;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    button:hover {
      background: #444;
    }

    .cart-item {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }

    .payment-box {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

  </style>
</head>

<body>

<header>
  <h1>Mes impressions 3D</h1>
</header>

<nav>
  <a href="#figurines">Figurines</a>
  <a href="#utile">Objets utiles</a>
  <a href="#fidget">Fidget</a>
  <a href="#pistolet">Fun</a>
  <a href="#panier">Panier</a>
</nav>

<div class="container" id="figurines">
  <h2 class="category-title">Figurines</h2>

  <div class="grid">

    <div class="card">
      <img src="dragon.webp">
      <div class="card-content">
        <h3>Dragon</h3>
        <p>5€</p>
        <button onclick="addToCart('Dragon',5)">Ajouter</button>
      </div>
    </div>

    <div class="card">
      <img src="figurine cochon.webp">
      <div class="card-content">
        <h3>Cochon</h3>
        <p>5€</p>
        <button onclick="addToCart('Cochon',5)">Ajouter</button>
      </div>
    </div>

  </div>
</div>

<div class="container" id="panier">
  <h2 class="category-title">Panier</h2>

  <div id="cart-items"></div>
  <h3>Total : <span id="cart-total">0</span> €</h3>

  <!-- PAYPAL -->
  <div class="payment-box">
    <h3>PayPal</h3>
    <button onclick="payWithPaypal()">Payer avec PayPal</button>
  </div>

  <!-- EMAIL -->
  <div class="payment-box">
    <h3>Envoyer la commande</h3>

    <input id="name" placeholder="Nom">
    <input id="email" placeholder="Email">
    <textarea id="address" placeholder="Adresse"></textarea>

    <button onclick="sendOrderEmail()">Envoyer la commande</button>
  </div>

</div>

<script>

let cart = [];
let total = 0;

function addToCart(name, price){
  cart.push({name, price});
  total += price;
  updateCart();
}

function removeFromCart(index){
  total -= cart[index].price;
  cart.splice(index,1);
  updateCart();
}

function updateCart(){

  const box = document.getElementById("cart-items");
  const totalBox = document.getElementById("cart-total");

  box.innerHTML = "";

  cart.forEach((item,i)=>{
    box.innerHTML += `
      <div class="cart-item">
        ${item.name} - ${item.price}€
        <button onclick="removeFromCart(${i})">X</button>
      </div>
    `;
  });

  totalBox.innerText = total.toFixed(2);
}

function payWithPaypal(){

  if(total <= 0){
    alert("Panier vide");
    return;
  }

  window.open(`https://paypal.me/yecine/${total}`, "_blank");
}

function sendOrderEmail(){

  if(cart.length === 0){
    alert("Panier vide");
    return;
  }

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const address = document.getElementById("address").value;

  let order = "";

  cart.forEach(i=>{
    order += `- ${i.name} (${i.price}€)\n`;
  });

  fetch("https://api.web3forms.com/submit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      access_key: "8766f665-dac8-4be6-936e-43b8c17454ea",
      name: name,
      email: email,
      message: `Commande:\n${order}\n\nAdresse:\n${address}\n\nTotal: ${total}€`
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      alert("Commande envoyée !");
      cart = [];
      total = 0;
      updateCart();
    } else {
      alert("Erreur envoi");
    }
  });

}

</script>

</body>
</html>
